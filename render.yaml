# Render Blueprint for DevCommunity API
# Deploy the Express backend to Render.com

services:
  - type: web
    name: devcommunity-api
    env: node
    region: ohio
    plan: free
    buildCommand: cd apps/api && npm install && npx prisma generate && npm run build
    startCommand: cd apps/api && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: API_URL
        sync: false
      - key: ENABLE_REDIS
        value: "true"
      - key: ENABLE_OAUTH
        value: "false"
      - key: ENABLE_EMAIL
        value: "false"
      - key: ENABLE_S3
        value: "false"
      - key: ENABLE_OPENAI
        value: "false"
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
